version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: iot-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - iot-network
    restart: unless-stopped

  # Provider Service
  provider:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot-provider
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: 123
      DB_POOL_SIZE: 5
      # Enable debug logging for configuration troubleshooting
      VERTX_LOGGER_DELEGATE_FACTORY_CLASS_NAME: io.vertx.core.logging.SLF4JLogDelegateFactory
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - iot-network
    restart: unless-stopped
    volumes:
      - provider_logs:/app/logs

networks:
  iot-network:
    driver: bridge
    name: iot-network

volumes:
  postgres_data:
    name: iot-postgres-data
  provider_logs:
    name: iot-provider-logs